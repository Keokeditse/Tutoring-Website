<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Reviews - Private Tutoring</title>
<link rel="stylesheet" href="reviews.css">
</head>
<body>

<div class="page">

  <header class="page-header">
    <div class="overline">🎓 Private Tutoring</div>
    <h1>Session <span class="highlight">Reviews</span></h1>
    <p class="subtitle">No names needed — just share your honest experience.</p>
  </header>

  <!-- ─── Review form (top of page) ─── -->
  <section class="review-form-card">
    <h2>✍️ Leave a Review</h2>
    <form id="reviewForm">
      <div class="form-group">
        <label for="rating">Rating</label>
        <div class="star-picker" id="starPicker">
          <button type="button" class="star" data-value="1">★</button>
          <button type="button" class="star" data-value="2">★</button>
          <button type="button" class="star" data-value="3">★</button>
          <button type="button" class="star" data-value="4">★</button>
          <button type="button" class="star" data-value="5">★</button>
        </div>
        <input type="hidden" id="rating" name="rating" required>
      </div>

      <div class="form-group">
        <label for="text">Your Feedback</label>
        <textarea id="text" name="text" maxlength="1000" placeholder="How was your tutoring session? What worked well for you?" required></textarea>
        <div class="char-count"><span id="charCount">0</span>/1000</div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Submit Review</button>
    </form>
    <div class="form-status" id="formStatus"></div>
  </section>

  <!-- ─── Reviews list (below form) ─── -->
  <section class="reviews-section">
    <h2>💬 What Students Are Saying</h2>
    <div id="reviewsSummary" class="reviews-summary"></div>
    <div id="reviewsList" class="reviews-list">
      <div class="loading">Loading reviews…</div>
    </div>
  </section>

</div>

<script src="reviews.js"></script>
</body>
</html>
